# `AllowOverride All` would let any .htaccess under the document root
# override Apache directives. The bundled web/public/.htaccess only needs
# RewriteRule + Authorization passthrough, both of which fall under
# FileInfo + AuthConfig. Narrowing the scope means an attacker who later
# manages to drop a file under document root cannot pivot to RCE via a
# crafted .htaccess.
<Directory /app/web/public>
    AllowOverride FileInfo AuthConfig Limit Options=FollowSymLinks
    Require all granted
</Directory>
