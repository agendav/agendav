<div id="event_details"></div>
<div id="popup" class="freeow freeow-top-right"></div>

{% for script in scripts %}
<script language="JavaScript" type="text/javascript" src="{{ asset(script, 'js') }}"></script>
{% endfor %}

{% if load_fullcalendar_locale is defined and fullcalendar_languages[lang] is defined %}
  {% set fullcalendar_locale = fullcalendar_languages[lang] %}
  {% set locale_path = 'fullcalendar-locale/' ~ fullcalendar_locale ~ '.js' %}
  <script language="JavaScript" type="text/javascript" src="{{ asset(locale_path) }}"></script>
{% endif %}
