name: CI

on:
  push:
    branches: [ "development", "main" ]
  pull_request:
    branches: [ "development", "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Audit dependencies for known vulnerabilities
        run: composer audit --locked

      # All npm packages are devDependencies (build-time tooling only — they
      # never reach the runtime image). Surfaced on every PR for visibility;
      # continue-on-error so legacy advisories on jquery 3.3.1 / bootstrap 3
      # don't block unrelated work until those are bumped.
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run test suite
        run: ./vendor/bin/phpunit -c tests/phpunit.xml
