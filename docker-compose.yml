# Local development stack only — NOT a production deployment.
# Credentials below are the defaults used when running `docker compose up`
# without a .env file. Override them by creating a .env file next to this
# compose file:
#
#   AGENDAV_DB_ROOT_PASSWORD=...
#   AGENDAV_DB_PASSWORD=...
#
# Ports are bound to 127.0.0.1 so the stack is not reachable from other hosts.
services:
  db:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: ${AGENDAV_DB_ROOT_PASSWORD:-dev-root-only-do-not-deploy}
      MARIADB_DATABASE: ${AGENDAV_DB_NAME:-agendav}
      MARIADB_USER: ${AGENDAV_DB_USER:-agendav}
      MARIADB_PASSWORD: ${AGENDAV_DB_PASSWORD:-agendav}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  baikal:
    image: ckulka/baikal:nginx
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - baikal-config:/var/www/baikal/config
      - baikal-data:/var/www/baikal/Specific

  web-builder:
    build: ./docker/builder
    volumes:
      - ./:/app
    restart: "no"

  web:
    build: ./docker/agendav
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./:/app
      - agendav-var:/app/var
    environment:
      AGENDAV_ENVIRONMENT: dev
    depends_on:
      db:
        condition: service_healthy
      baikal:
        condition: service_started
      web-builder:
        condition: service_completed_successfully

volumes:
  baikal-config:
  baikal-data:
  agendav-var:
